

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MasterPiece - [Classic Edition]</title>
  <style>
    html {
      height: 100%;
    }
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Optional header styling */
    h1 {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    /* The canvas will be resized dynamically */
    canvas {
      display: block;
      background-color: #f0f0f0; /* Optional: for visibility */
      border: 1px solid;
    }

    /* ── Mobile Gamepad Overlay ── */
    #gamepad-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 1000;
    }
    #gamepad-overlay.visible {
      display: grid;
      align-items: center;
    }

    /* Shared panel styles */
    .gp-panel {
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      flex-shrink: 0;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      box-sizing: border-box;
    }
    #gp-left  {
      justify-self: center;
      padding-left: 12px;
      padding-right: 12px;
    }
    #gp-right {
      justify-self: center;
      padding-left: 12px;
      padding-right: 12px;
    }

    /* ── D-Pad ── */
    .dpad {
      position: relative;
      width: 130px;
      height: 130px;
    }
    .dpad-btn {
      position: absolute;
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 24px;
      font-family: Arial, sans-serif;
    }
    .dpad-btn:active, .dpad-btn.pressed {
      background: rgba(255,255,255,0.38);
    }
    .dpad-up    { width: 44px; height: 44px; top: 0;   left: 43px; }
    .dpad-down  { width: 44px; height: 44px; bottom: 0;left: 43px; }
    .dpad-left  { width: 44px; height: 44px; top: 43px;left: 0;    }
    .dpad-right { width: 44px; height: 44px; top: 43px;right: 0;   }

    /* ── Action Buttons ── */
    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }
    .utility-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      margin-top: 18px;
    }
    .action-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 22px;
      color: #fff;
    }
    .action-btn:active, .action-btn.pressed {
      filter: brightness(1.5);
      transform: scale(0.93);
    }
    .utility-btn {
      min-width: 88px;
      height: 28px;
      padding: 0 16px;
      border-radius: 18px;
      border: 2px solid rgba(255,255,255,0.32);
      background: rgba(148, 148, 148, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-sizing: border-box;
    }
    .utility-btn:active, .utility-btn.pressed {
      background: rgba(190, 190, 190, 0.88);
      transform: scale(0.96);
    }
    .btn-red  { background: rgba(220, 40, 40, 0.72); }
    .btn-blue { background: rgba(40, 80, 220, 0.72); }

    /* Middle spacer matches the canvas column */
    .gp-spacer {
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- Mobile gamepad overlay -->
  <div id="gamepad-overlay">
    <div class="gp-panel" id="gp-left">
      <div class="dpad">
        <div class="dpad-btn dpad-up"    data-key="ArrowUp">&#9650;</div>
        <div class="dpad-btn dpad-down"  data-key="ArrowDown">&#9660;</div>
        <div class="dpad-btn dpad-left"  data-key="ArrowLeft">&#9664;</div>
        <div class="dpad-btn dpad-right" data-key="ArrowRight">&#9654;</div>
      </div>
    </div>
    <div class="gp-spacer"></div>
    <div class="gp-panel" id="gp-right">
      <div class="action-buttons">
        <div class="action-btn btn-red"  data-key="a">A</div>
        <div class="action-btn btn-blue" data-key="s">S</div>
        <div class="utility-buttons">
          <div class="utility-btn" data-key=" ">Space</div>
          <div class="utility-btn" data-key="Enter">Enter</div>
        </div>
      </div>
    </div>
  </div>

  <script type="text/javascript">
    // Define the base game resolution.
    // This is the internal resolution your game will render at.
    var baseWidth = 1440;
    var baseHeight = 1080;
    
    // Create the Module object used by Emscripten.
    var Module = {
      canvas: (function(){
        var canvas = document.getElementById('canvas');
        // Set the internal resolution of the canvas.
        canvas.width = baseWidth;
        canvas.height = baseHeight;
        return canvas;
      })(),
      onRuntimeInitialized: function() {
        console.log("Emscripten app is ready.");
        // Resize after runtime has initialized.
        resizeCanvas();
      }
    };

    var mobileRegex = /Mobi|Android|iPhone|iPad|iPod/i;
    var controlReservePerSide = 160;

    // Function to adjust the canvas size while preserving 4:3 aspect ratio.
    function resizeCanvas() {
      var canvas = Module.canvas;
      var overlay = document.getElementById('gamepad-overlay');
      var aspect = 4 / 3;
      var windowWidth = window.innerWidth;
      var windowHeight = window.innerHeight;
      var isMobile = mobileRegex.test(navigator.userAgent);
      var isLandscape = windowWidth > windowHeight;
      var showControls = isMobile && isLandscape;
      var maxCanvasWidth = windowWidth;

      if (showControls) {
        maxCanvasWidth = Math.max(0, windowWidth - (controlReservePerSide * 2));
      }

      var availWidth = maxCanvasWidth;
      var availHeight = windowHeight;

      var w, h;
      if (availWidth / availHeight > aspect) {
        h = availHeight;
        w = h * aspect;
      } else {
        w = availWidth;
        h = w / aspect;
      }

      canvas.style.width = Math.floor(w) + 'px';
      canvas.style.height = Math.floor(h) + 'px';

      if (showControls) {
        var sideWidth = Math.max(0, Math.floor((windowWidth - w) / 2));
        overlay.style.gridTemplateColumns = sideWidth + 'px ' + Math.floor(w) + 'px ' + sideWidth + 'px';
      } else {
        overlay.style.gridTemplateColumns = '';
      }
    }

    // Add an event listener to resize the canvas when the window is resized.
    window.addEventListener('resize', resizeCanvas);

    // ── Mobile Gamepad Logic ──
    (function() {
      var overlay = document.getElementById('gamepad-overlay');

      function checkLandscape() {
        if (mobileRegex.test(navigator.userAgent) && window.innerWidth > window.innerHeight) {
          overlay.classList.add('visible');
        } else {
          overlay.classList.remove('visible');
        }

        resizeCanvas();
      }

      window.addEventListener('resize', checkLandscape);
      window.addEventListener('orientationchange', function() {
        setTimeout(checkLandscape, 150);
      });
      checkLandscape();

      // Map of key strings → KeyboardEvent key codes
      var keyCodeMap = {
        'ArrowUp': 38, 'ArrowDown': 40, 'ArrowLeft': 37, 'ArrowRight': 39,
        'a': 65, 's': 83, ' ': 32, 'Enter': 13
      };

      function fireKey(type, key) {
        var code = keyCodeMap[key] || 0;
        var eventCode = key === ' ' ? 'Space' : (key.length === 1 ? 'Key' + key.toUpperCase() : key);
        var evt = new KeyboardEvent(type, {
          key: key,
          code: eventCode,
          keyCode: code,
          which: code,
          bubbles: true,
          cancelable: true
        });
        document.dispatchEvent(evt);
      }

      // Attach touch events to all gamepad buttons
      var buttons = overlay.querySelectorAll('[data-key]');
      for (var i = 0; i < buttons.length; i++) {
        (function(btn) {
          var key = btn.getAttribute('data-key');

          btn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            btn.classList.add('pressed');
            fireKey('keydown', key);
          }, { passive: false });

          btn.addEventListener('touchend', function(e) {
            e.preventDefault();
            btn.classList.remove('pressed');
            fireKey('keyup', key);
          }, { passive: false });

          btn.addEventListener('touchcancel', function(e) {
            btn.classList.remove('pressed');
            fireKey('keyup', key);
          });
        })(buttons[i]);
      }
    })();
  </script>
  
  <!-- Load the Emscripten generated JavaScript file -->
  <script src="MasterPiece.js?v=1.3x"></script>
</body>
</html>
